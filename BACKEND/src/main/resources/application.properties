# Carga el archivo .env como fuente de propiedades (reemplaza spring-dotenv, incompatible con SB 4.x)
# En local: busca .env en el directorio donde corre el proceso (BACKEND/)
# En Docker: el env_file de docker-compose ya inyecta las variables; optional: evita fallo si no existe
spring.config.import=optional:file:.env[.properties]

# Límite de subida de archivos — debe coincidir con ArchivoService.MAX_TAMANO_BYTES (10 MB)
# CU24: Microservicio TensorFlow de predicción de demora y anomalías (puerto 5001)
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# 👇 NUEVO: Configuración AWS S3 para almacenamiento de archivos
aws.s3.bucket=bpms-core-archivos-oliver
aws.s3.region=us-east-2
# 👇 NUEVO Alias que espera S3Config.java (los buscaba con @Value("${aws.s3.access-key}"))
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
archivo.s3.required=${ARCHIVO_S3_REQUIRED:false}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
nlp.service.url=${NLP_SERVICE_URL:http://127.0.0.1:8000/api/v1}
# CU21: Microservicio Whisper para transcripción de audio de formularios (puerto 8001)
nlp.formulario.url=${NLP_FORMULARIO_URL:http://127.0.0.1:8001/api/v1}
# Timeout en ms para esperar la respuesta de Whisper (faster-whisper base tarda ~8-12s por 40s de audio)
nlp.formulario.timeout-ms=${NLP_FORMULARIO_TIMEOUT_MS:90000}
# Carpeta de Google Drive — credenciales cargadas desde .env
google.drive.parent-folder-id=${GOOGLE_DRIVE_FOLDER_ID:}
google.drive.oauth.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
google.drive.oauth.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
google.drive.oauth.refresh-token=${GOOGLE_DRIVE_REFRESH_TOKEN:}
