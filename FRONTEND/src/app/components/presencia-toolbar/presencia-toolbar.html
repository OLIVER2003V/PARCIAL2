@if (visible && conectados().length > 0) {
<div class="flex items-center gap-3 px-5 py-2.5 bg-indigo-50/50 border-b border-indigo-100 flex-shrink-0 relative z-20">

  <div class="flex items-center gap-2 bg-white px-2.5 py-1 rounded-md border border-indigo-100 shadow-sm">
    <span class="relative flex h-2 w-2">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
    </span>
    <span class="text-[10px] font-black uppercase tracking-wider text-indigo-800">
      Sesión activa
    </span>
  </div>

  <div class="h-4 w-px bg-indigo-200"></div>

  <div class="flex items-center gap-2">
    <div class="flex items-center -space-x-2">
      
      @if (miPresencia(); as yo) {
      <div class="relative group z-10 cursor-help">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold border-[2px] border-white shadow-sm"
             [style.background-color]="yo.color">
          {{ yo.iniciales }}
        </div>
        <span class="absolute top-full left-1/2 -translate-x-1/2 mt-1.5 px-2.5 py-1 bg-slate-800 text-white rounded-lg text-[10px] font-medium whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-200 z-50 shadow-md">
          {{ yo.nombreCompleto }} (Tú)
          <span class="absolute bottom-full left-1/2 -translate-x-1/2 border-4 border-transparent border-b-slate-800"></span>
        </span>
      </div>
      }

      @for (c of otrosConectados(); track c.username) {
      <div class="relative group cursor-help transition-transform hover:scale-110 hover:-translate-y-1 hover:z-20">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold border-[2px] border-white shadow-sm"
             [style.background-color]="c.color">
          {{ c.iniciales }}
        </div>
        <span class="absolute top-full left-1/2 -translate-x-1/2 mt-1.5 px-2.5 py-1 bg-slate-800 text-white rounded-lg text-[10px] font-medium whitespace-nowrap opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-200 z-50 shadow-md">
          {{ c.nombreCompleto }}
          <span class="absolute bottom-full left-1/2 -translate-x-1/2 border-4 border-transparent border-b-slate-800"></span>
        </span>
      </div>
      }
    </div>

    <span class="text-[11px] text-indigo-600 font-bold bg-white px-2 py-0.5 rounded-md border border-indigo-100 shadow-sm">
      {{ totalConectados() }} en línea
    </span>
  </div>

  <div class="flex-1"></div>

  <button (click)="invitar()"
          class="flex items-center gap-1.5 px-3.5 py-1.5 bg-white hover:bg-purple-50 border border-purple-200 hover:border-purple-300 text-purple-700 text-xs font-bold rounded-lg transition-all shadow-sm focus:outline-none focus:ring-4 focus:ring-purple-100">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
    <span>Compartir o Invitar</span>
  </button>
</div>
}
